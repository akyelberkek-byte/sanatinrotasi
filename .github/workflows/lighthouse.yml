name: Lighthouse

on:
  schedule:
    - cron: "0 7 * * 1" # Her pazartesi 07:00 UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit production URLs
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://sanatinrotasi.com/
            https://sanatinrotasi.com/yazilar
            https://sanatinrotasi.com/etkinlikler
            https://sanatinrotasi.com/hakkinda
          uploadArtifacts: true
          temporaryPublicStorage: true
