name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Lint bilgi amaçlı — mevcut kod tabanındaki uyarılar build'i kırmasın
      - name: Lint (non-blocking)
        run: npm run lint || true
      - run: npx next build
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: production
          # Build, Clerk/Resend key'leri olmadan da geçmeli (fallback'ler mevcut)
